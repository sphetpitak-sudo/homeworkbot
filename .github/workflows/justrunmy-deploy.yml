name: Build and Push to JustRunMy

on:
  push:
    branches: [deploy]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to JustRunMy registry
        uses: docker/login-action@v2
        with:
          registry: jdr-q93on76yt8.justrunmy.app
          username: ${{ secrets.JRM_USERNAME }}
          password: ${{ secrets.JRM_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            jdr-q93on76yt8.justrunmy.app/q93on76yt8:${{ github.sha }}
            jdr-q93on76yt8.justrunmy.app/q93on76yt8:latest
            jdr-q93on76yt8.justrunmy.app/q93on76yt8:v1_autodeploy
