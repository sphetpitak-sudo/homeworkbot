<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homework Bot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 0; }
.header { background: #1e293b; padding: 14px 20px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #334155; }
.header-inner { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; color: #f8fafc; cursor: pointer; }
.header h1:hover { color: #60a5fa; }
.header-actions { display: flex; gap: 8px; }
.btn { background: #334155; color: #e2e8f0; border: none; border-radius: 8px; padding: 7px 12px; cursor: pointer; font-size: 12px; transition: background .2s; }
.btn:hover { background: #475569; }
.btn-primary { background: #3b82f6; }
.btn-primary:hover { background: #2563eb; }
.btn-outline { background: transparent; border: 1px solid #475569; }
.btn-outline:hover { background: #334155; }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.container { max-width: 1000px; margin: 0 auto; padding: 20px; }

/* home */
.home-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 10px; }
.home-card { background: #1e293b; border-radius: 12px; padding: 24px 20px; text-align: center; cursor: pointer; transition: all .2s; }
.home-card:hover { background: #334155; transform: translateY(-2px); }
.home-card .icon { font-size: 32px; margin-bottom: 8px; }
.home-card .title { font-size: 16px; font-weight: 600; }
.home-card .desc { font-size: 12px; color: #64748b; margin-top: 4px; }

/* stats */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat { background: #1e293b; border-radius: 12px; padding: 14px; text-align: center; }
.stat .num { font-size: 24px; font-weight: 700; }
.stat .lbl { font-size: 12px; color: #94a3b8; margin-top: 3px; }
.stat.todo .num { color: #f87171; }
.stat.prog .num { color: #fbbf24; }
.stat.done .num { color: #34d399; }
.stat.total .num { color: #60a5fa; }
.stat.urgent .num { color: #f97316; }
.stat.overdue .num { color: #ef4444; }

.section { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.section h3 { font-size: 14px; color: #94a3b8; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.bar-bg { background: #334155; border-radius: 8px; height: 20px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 8px; transition: width .6s; }
.bar-labels { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-top: 4px; }

.badge-list { display: flex; flex-wrap: wrap; gap: 6px; }
.badge-item { background: #334155; border-radius: 999px; padding: 5px 12px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
.badge-item .count { color: #94a3b8; }

.filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-btn { background: #334155; color: #94a3b8; border: none; border-radius: 999px; padding: 5px 12px; cursor: pointer; font-size: 12px; transition: all .2s; }
.filter-btn.active { background: #3b82f6; color: #fff; }
.filter-btn:hover { background: #475569; }

.search-box { background: #334155; border: none; border-radius: 8px; padding: 8px 12px; color: #e2e8f0; font-size: 13px; width: 100%; margin-bottom: 12px; outline: none; }
.search-box::placeholder { color: #64748b; }
.search-box:focus { box-shadow: 0 0 0 2px #3b82f680; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 7px 10px; color: #64748b; font-weight: 500; border-bottom: 1px solid #334155; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
td { padding: 7px 10px; border-bottom: 1px solid #1e293b; }
tr:hover td { background: #ffffff08; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
.dot.todo { background: #f87171; }
.dot.prog { background: #fbbf24; }
.dot.done { background: #34d399; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: #334155; color: #94a3b8; display: inline-block; }
.overdue { color: #f87171; font-weight: 600; }
.soon { color: #fbbf24; }
.safe { color: #34d399; }
.grp td { color: #64748b; font-size: 11px; font-weight: 600; padding-top: 12px; border-bottom: none; background: transparent !important; }

.empty { text-align: center; padding: 24px; color: #64748b; font-size: 13px; }
.error-box { text-align: center; padding: 24px; color: #f87171; }
.last-update { text-align: right; font-size: 11px; color: #475569; margin-top: 6px; }

.hide { display: none; }

@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(3, 1fr); }
  .home-grid { grid-template-columns: repeat(2, 1fr); }
  table { font-size: 12px; }
  th, td { padding: 5px 6px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1 onclick="showHome()">📚 Homework Bot</h1>
    <div class="header-actions" id="headerActions">
      <button class="btn btn-primary" onclick="showHome()">🏠 กลับหน้าหลัก</button>
    </div>
  </div>
</div>

<div class="container" id="app">

<!-- HOME -->
<div id="homeView">
  <p style="color:#64748b;margin-bottom:16px;">เลือกเมนูที่ต้องการ</p>
  <div class="home-grid">
    <div class="home-card" onclick="showDashboard()">
      <div class="icon">📊</div>
      <div class="title">Dashboard</div>
      <div class="desc">ภาพรวม สถิติ ความคืบหน้า</div>
    </div>
    <div class="home-card" onclick="showHomework()">
      <div class="icon">📋</div>
      <div class="title">รายการทั้งหมด</div>
      <div class="desc">ดู ค้นหา กรองการบ้าน</div>
    </div>
    <div class="home-card" onclick="showOverdue()">
      <div class="icon">🚨</div>
      <div class="title">งานเลยกำหนด</div>
      <div class="desc">การบ้านที่ส่งไม่ทัน</div>
    </div>
    <div class="home-card" onclick="window.location.reload()">
      <div class="icon">🔄</div>
      <div class="title">โหลดใหม่</div>
      <div class="desc">ดึงข้อมูลล่าสุด</div>
    </div>
  </div>
</div>

<!-- DASHBOARD VIEW -->
<div id="dashboardView" class="hide">
  <div class="stats" id="statsCards"></div>
  <div class="section">
    <h3>📊 ความคืบหน้า</h3>
    <div class="bar-bg"><div class="bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="bar-labels"><span id="progressLabel">0 / 0</span><span id="progressPct">0%</span></div>
  </div>
  <div class="section">
    <h3>📖 วิชาที่ยังค้าง</h3>
    <div class="badge-list" id="subjectList"></div>
  </div>
  <div class="section">
    <h3>⏰ ตามช่วงเวลา</h3>
    <div class="badge-list" id="timeGroupList"></div>
  </div>
  <div style="text-align:center;margin-top:-8px;display:flex;gap:8px;justify-content:center;">
    <button class="btn btn-primary" onclick="showHomework()">📋 ดูรายการทั้งหมด</button>
    <button class="btn btn-outline" onclick="showHome()">🏠 กลับหน้าหลัก</button>
  </div>
</div>

<!-- HOMEWORK VIEW -->
<div id="homeworkView" class="hide">
  <div class="section">
    <input class="search-box" id="searchBox" placeholder="🔍 ค้นหาชื่อ หรือวิชา..." oninput="filterTable()">
    <div class="filters" id="filterTabs"></div>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>สถานะ</th><th>ชื่อ</th><th>วิชา</th><th>กำหนดส่ง</th><th>เหลือ</th></tr></thead>
        <tbody id="homeworkTable"></tbody>
      </table>
    </div>
    <div style="text-align:center;margin-top:12px;">
      <button class="btn btn-outline" onclick="showHome()">🏠 กลับหน้าหลัก</button>
    </div>
    <div class="last-update" id="lastUpdate"></div>
  </div>
</div>

</div>

<script>
const TOKEN = new URLSearchParams(location.search).get("token");
let allItems = [];
let currentFilter = "all";
let currentSearch = "";

function qs(id) { return document.getElementById(id); }

function showHome() {
  qs("homeView").classList.remove("hide");
  qs("dashboardView").classList.add("hide");
  qs("homeworkView").classList.add("hide");
}

function showDashboard() {
  qs("homeView").classList.add("hide");
  qs("dashboardView").classList.remove("hide");
  qs("homeworkView").classList.add("hide");
  loadStats();
}

function showHomework() {
  qs("homeView").classList.add("hide");
  qs("dashboardView").classList.add("hide");
  qs("homeworkView").classList.remove("hide");
  loadAll();
}

function showOverdue() {
  qs("homeView").classList.add("hide");
  qs("dashboardView").classList.add("hide");
  qs("homeworkView").classList.remove("hide");
  currentFilter = "overdue";
  loadAll();
}

async function fetchJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function loadData() {
  if (!TOKEN) return;
  try {
    const [stats, homework] = await Promise.all([
      fetchJson(`/api/stats?token=${TOKEN}`),
      fetchJson(`/api/homework?token=${TOKEN}`),
    ]);
    allItems = homework;
    renderDashboard(stats);
    renderFilters();
    filterTable();
    qs("lastUpdate").textContent = "อัปเดต: " + new Date().toLocaleString("th-TH");
  } catch (err) {
    qs("statsCards").innerHTML = `<div class="error-box">❌ ${err.message}</div>`;
  }
}

function renderDashboard(s) {
  qs("statsCards").innerHTML = `
    <div class="stat todo"><div class="num">${s.todo}</div><div class="lbl">📌 ยังไม่ทำ</div></div>
    <div class="stat prog"><div class="num">${s.prog}</div><div class="lbl">🔄 กำลังทำ</div></div>
    <div class="stat done"><div class="num">${s.done}</div><div class="lbl">✅ เสร็จแล้ว</div></div>
    <div class="stat total"><div class="num">${s.total}</div><div class="lbl">📦 รวม</div></div>
    <div class="stat urgent"><div class="num">${s.urgent}</div><div class="lbl">⚡ เร่งด่วน</div></div>
    <div class="stat overdue"><div class="num">${s.overdue||0}</div><div class="lbl">🚨 เลยกำหนด</div></div>
  `;
  qs("progressBar").style.width = s.pct + "%";
  qs("progressLabel").textContent = s.done + " / " + s.total + " รายการ";
  qs("progressPct").textContent = s.pct + "%";

  const subs = Object.entries(s.bySubject).sort((a, b) => b[1] - a[1]);
  qs("subjectList").innerHTML = subs.length
    ? subs.map(([n, c]) => `<span class="badge-item"><span>${esc(n)}</span><span class="count">${c}</span></span>`).join("")
    : '<span style="color:#64748b;font-size:13px;">🎉 ไม่มีการบ้านค้าง</span>';

  const today = new Date(); today.setHours(0,0,0,0);
  const eow = new Date(today); eow.setDate(today.getDate()+(7-today.getDay()));
  const enw = new Date(eow); enw.setDate(eow.getDate()+7);
  const groups = { overdue: 0, thisWeek: 0, nextWeek: 0, later: 0 };
  for (const item of allItems) {
    if (item.status === "Done" || !item.due) continue;
    const dt = new Date(item.due+"T00:00:00");
    if (dt < today) groups.overdue++;
    else if (dt <= eow) groups.thisWeek++;
    else if (dt <= enw) groups.nextWeek++;
    else groups.later++;
  }
  qs("timeGroupList").innerHTML = [
    ["🚨 เลยกำหนด", groups.overdue, "#f87171"],
    ["📅 อาทิตย์นี้", groups.thisWeek, "#fbbf24"],
    ["📅 อาทิตย์หน้า", groups.nextWeek, "#60a5fa"],
    ["📅 ยังอีกนาน", groups.later, "#64748b"],
  ].filter(([_,c]) => c).map(([l, c]) =>
    `<span class="badge-item" style="border-left:3px solid ${c};padding-left:10px;"><span>${l}</span><span class="count">${c}</span></span>`
  ).join("") || '<span style="color:#64748b;font-size:13px;">🎉 ไม่มีข้อมูล</span>';
}

async function loadStats() {
  try {
    const s = await fetchJson(`/api/stats?token=${TOKEN}`);
    if (!allItems.length) {
      const h = await fetchJson(`/api/homework?token=${TOKEN}`);
      allItems = h;
    }
    renderDashboard(s);
  } catch (err) {
    qs("statsCards").innerHTML = `<div class="error-box">❌ ${err.message}</div>`;
  }
}

async function loadAll() {
  if (!TOKEN) return;
  try {
    if (!allItems.length) {
      const h = await fetchJson(`/api/homework?token=${TOKEN}`);
      allItems = h;
    }
    renderFilters();
    filterTable();
    qs("lastUpdate").textContent = "อัปเดต: " + new Date().toLocaleString("th-TH");
  } catch (err) {
    qs("homeworkTable").innerHTML = `<tr><td colspan="5" class="error-box">❌ ${err.message}</td></tr>`;
  }
}

function renderFilters() {
  const counts = { all: allItems.length, overdue: 0 };
  for (const i of allItems) {
    const s = i.status === "Todo" ? "todo" : i.status === "In Progress" ? "prog" : "done";
    counts[s] = (counts[s]||0) + 1;
    if (i.status !== "Done" && i.due && new Date(i.due+"T00:00:00") < new Date()) counts.overdue++;
  }
  const tabs = [
    ["all", "ทั้งหมด"],
    ["overdue", "🚨 เลยกำหนด"],
    ["todo", "📌 ยังไม่ทำ"],
    ["prog", "🔄 กำลังทำ"],
    ["done", "✅ เสร็จแล้ว"],
  ];
  qs("filterTabs").innerHTML = tabs.map(([k]) =>
    `<button class="filter-btn${currentFilter===k?' active':''}" onclick="setFilter('${k}')">${tabs.find(t=>t[0]===k)[1]}</button>`
  ).join("");
}

function setFilter(f) {
  currentFilter = f;
  renderFilters();
  filterTable();
}

function filterTable() {
  currentSearch = qs("searchBox").value.toLowerCase().trim();
  let filtered = allItems;
  const today = new Date(); today.setHours(0,0,0,0);

  if (currentFilter === "overdue") filtered = filtered.filter(i => i.status !== "Done" && i.due && new Date(i.due+"T00:00:00") < today);
  else if (currentFilter === "todo") filtered = filtered.filter(i => i.status === "Todo");
  else if (currentFilter === "prog") filtered = filtered.filter(i => i.status === "In Progress");
  else if (currentFilter === "done") filtered = filtered.filter(i => i.status === "Done");

  if (currentSearch) {
    filtered = filtered.filter(i =>
      i.title.toLowerCase().includes(currentSearch) ||
      i.subject.toLowerCase().includes(currentSearch)
    );
  }

  renderTable(filtered);
}

function renderTable(items) {
  const today = new Date(); today.setHours(0,0,0,0);
  const tbody = qs("homeworkTable");

  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">📭 ไม่มีรายการ</td></tr>';
    return;
  }

  const groups = { overdue: [], thisWeek: [], nextWeek: [], later: [], noDate: [], done: [] };
  const eow = new Date(today); eow.setDate(today.getDate()+(7-today.getDay()));
  const enw = new Date(eow); enw.setDate(eow.getDate()+7);

  for (const item of items) {
    if (item.status === "Done") { groups.done.push(item); continue; }
    if (!item.due) { groups.noDate.push(item); continue; }
    const dt = new Date(item.due+"T00:00:00");
    if (dt < today) groups.overdue.push(item);
    else if (dt <= eow) groups.thisWeek.push(item);
    else if (dt <= enw) groups.nextWeek.push(item);
    else groups.later.push(item);
  }

  const config = [
    ["🚨 เลยกำหนด", groups.overdue],
    ["📅 อาทิตย์นี้", groups.thisWeek],
    ["📅 อาทิตย์หน้า", groups.nextWeek],
    ["📅 ยังอีกนาน", groups.later],
    ["📅 ไม่กำหนด", groups.noDate],
    ["✅ เสร็จแล้ว", groups.done],
  ];

  let html = "";
  for (const [hdr, g] of config) {
    if (!g.length) continue;
    g.sort((a, b) => a.due && b.due ? a.due.localeCompare(b.due) : a.due ? -1 : 1);
    html += `<tr class="grp"><td colspan="5">${hdr} (${g.length})</td></tr>`;
    html += g.map(item => {
      const sc = item.status === "Todo" ? "todo" : item.status === "In Progress" ? "prog" : "done";
      const sl = item.status === "Todo" ? "ยังไม่ทำ" : item.status === "In Progress" ? "กำลังทำ" : "เสร็จแล้ว";
      let dc = "", dl = item.due || "-", remain = "-";
      if (item.due) {
        const dt = new Date(item.due+"T00:00:00");
        const diff = Math.ceil((dt - today) / 86400000);
        if (diff < 0) { dc = "overdue"; dl = item.due; remain = `เลย ${-diff} วัน`; }
        else if (diff === 0) { dc = "overdue"; dl = item.due; remain = "วันนี้"; }
        else if (diff <= 3) { dc = "soon"; dl = item.due; remain = `อีก ${diff} วัน`; }
        else { dc = "safe"; dl = item.due; remain = `อีก ${diff} วัน`; }
      }
      return `<tr>
        <td><span class="dot ${sc}"></span>${sl}</td>
        <td>${esc(item.title)}</td>
        <td><span class="badge">${esc(item.subject)}</span></td>
        <td class="${dc}">${dl}</td>
        <td class="${dc}">${remain}</td>
      </tr>`;
    }).join("");
  }
  tbody.innerHTML = html;
}

function esc(t) { const d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

showHome();
</script>
</body>
</html>
