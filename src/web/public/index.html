<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homework Bot</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

/* nav */
.nav { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(71, 85, 105, 0.3); position: sticky; top: 0; z-index: 50; padding: 0 24px; }
.nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
.nav-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 600; font-size: 18px; color: #f8fafc; }
.nav-brand:hover { color: #60a5fa; }
.nav-links { display: flex; gap: 4px; }
.nav-link { background: none; border: none; color: #94a3b8; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all .2s; }
.nav-link:hover { background: rgba(71, 85, 105, 0.4); color: #e2e8f0; }
.nav-link.active { background: #3b82f6; color: #fff; }
.nav-link i { margin-right: 6px; }

.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* stats row */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: linear-gradient(135deg, #1e293b, #1a2332); border: 1px solid rgba(71, 85, 105, 0.3); border-radius: 16px; padding: 20px; transition: all .3s; }
.stat-card:hover { transform: translateY(-2px); border-color: rgba(59, 130, 246, 0.3); }
.stat-icon { font-size: 24px; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 700; line-height: 1.2; }
.stat-label { font-size: 13px; color: #64748b; margin-top: 4px; }

/* grid layout */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.card { background: #1e293b; border: 1px solid rgba(71, 85, 105, 0.3); border-radius: 16px; padding: 24px; }
.card-title { font-size: 14px; font-weight: 600; color: #94a3b8; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: .5px; }

/* chart */
.chart-wrapper { width: 100%; max-width: 300px; margin: 0 auto; }

/* subject badges */
.badge-list { display: flex; flex-wrap: wrap; gap: 10px; }
.badge-pill { display: flex; align-items: center; gap: 8px; background: rgba(51, 65, 85, 0.6); border: 1px solid rgba(71, 85, 105, 0.3); border-radius: 999px; padding: 8px 16px; font-size: 13px; transition: all .2s; }
.badge-pill:hover { background: #334155; }
.badge-dot { width: 10px; height: 10px; border-radius: 50%; }
.badge-count { color: #64748b; font-weight: 500; }

/* progress */
.progress-card { margin-bottom: 20px; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-pct { font-size: 24px; font-weight: 700; }
.progress-track { background: #1e293b; border-radius: 99px; height: 8px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 1s ease; }

/* table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { text-align: left; padding: 10px 12px; color: #64748b; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid rgba(71, 85, 105, 0.3); }
td { padding: 10px 12px; border-bottom: 1px solid rgba(71, 85, 105, 0.15); }
tr:hover td { background: rgba(59, 130, 246, 0.04); }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.dot.todo { background: #f87171; }
.dot.prog { background: #fbbf24; }
.dot.done { background: #34d399; }
.tag { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 99px; background: rgba(51, 65, 85, 0.6); color: #94a3b8; }
.overdue { color: #f87171; }
.soon { color: #fbbf24; }
.safe { color: #34d399; }
.grp td { font-weight: 600; font-size: 12px; color: #64748b; padding-top: 16px; border-bottom: none; }

/* search & filter */
.search-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search-input { flex: 1; min-width: 200px; background: rgba(51, 65, 85, 0.6); border: 1px solid rgba(71, 85, 105, 0.3); border-radius: 10px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; outline: none; transition: all .2s; }
.search-input::placeholder { color: #64748b; }
.search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { background: rgba(51, 65, 85, 0.4); border: 1px solid transparent; color: #94a3b8; border-radius: 999px; padding: 6px 14px; cursor: pointer; font-size: 13px; transition: all .2s; }
.filter-btn:hover { background: #334155; color: #e2e8f0; }
.filter-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

/* time badges */
.time-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
.time-badge { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 999px; font-size: 13px; background: rgba(51, 65, 85, 0.4); }
.time-badge .num { font-weight: 600; }

.empty { text-align: center; padding: 40px; color: #64748b; font-size: 14px; }
.meta { text-align: right; font-size: 12px; color: #475569; margin-top: 12px; }

/* views */
.hide { display: none; }

/* view toggle */
.view-enter { animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 768px) {
  .grid-2 { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(3, 1fr); }
  .nav-links .nav-link span { display: none; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand" onclick="showHome()">📚 Homework Bot</div>
    <div class="nav-links">
      <button class="nav-link" onclick="showHome()"><i>🏠</i><span>หน้าหลัก</span></button>
      <button class="nav-link" onclick="showDashboard()"><i>📊</i><span>Dashboard</span></button>
      <button class="nav-link" onclick="showHomework()"><i>📋</i><span>รายการ</span></button>
    </div>
  </div>
</nav>

<div class="container" id="app">

<!-- HOME -->
<div id="homeView" class="view-enter">
  <div style="text-align:center;padding:40px 0 20px;">
    <div style="font-size:48px;margin-bottom:12px;">📚</div>
    <h2 style="font-size:22px;font-weight:600;">Homework Bot</h2>
    <p style="color:#64748b;margin-top:6px;">ผู้ช่วยจัดการการบ้านของคุณ</p>
  </div>
  <div class="stats-row" id="homeStats"></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:8px;">
    <div class="stat-card" style="cursor:pointer;text-align:center;" onclick="showDashboard()">
      <div class="stat-icon">📊</div>
      <div class="stat-value" style="font-size:18px;">Dashboard</div>
      <div class="stat-label">ภาพรวมและสถิติ</div>
    </div>
    <div class="stat-card" style="cursor:pointer;text-align:center;" onclick="showHomework()">
      <div class="stat-icon">📋</div>
      <div class="stat-value" style="font-size:18px;">รายการทั้งหมด</div>
      <div class="stat-label">ดู ค้นหา กรองการบ้าน</div>
    </div>
    <div class="stat-card" style="cursor:pointer;text-align:center;" onclick="setHomeFilter('overdue')">
      <div class="stat-icon">🚨</div>
      <div class="stat-value" style="font-size:18px;">งานเลยกำหนด</div>
      <div class="stat-label">การบ้านที่ส่งไม่ทัน</div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardView" class="view-enter hide">
  <div class="stats-row" id="dashStats"></div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title">📊 สถานะการบ้าน</div>
      <div class="chart-wrapper"><canvas id="statusChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">📈 ความคืบหน้า</div>
      <div class="progress-card">
        <div class="progress-header">
          <span style="color:#64748b;">เสร็จแล้ว</span>
          <span class="progress-pct" id="dashPct">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="dashProgress" style="width:0%"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:13px;color:#64748b;">
          <span id="dashDoneLabel">0 / 0</span>
          <span id="dashTotalLabel">0 รายการ</span>
        </div>
      </div>
      <div class="card-title" style="margin-top:16px;">📖 วิชาที่ยังค้าง</div>
      <div class="badge-list" id="dashSubjects"></div>
      <div class="card-title" style="margin-top:16px;">⏰ ตามช่วงเวลา</div>
      <div class="time-row" id="dashTimeGroups"></div>
    </div>
  </div>
</div>

<!-- HOMEWORK LIST -->
<div id="homeworkView" class="view-enter hide">
  <div class="card">
    <div class="search-row">
      <input class="search-input" id="searchBox" placeholder="🔍 ค้นหาชื่อ หรือวิชา..." oninput="filterTable()">
      <div class="filter-group" id="filterTabs"></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th style="width:100px;">สถานะ</th><th>ชื่อ</th><th style="width:80px;">วิชา</th><th style="width:120px;">กำหนดส่ง</th><th style="width:80px;">เหลือ</th></tr></thead>
        <tbody id="homeworkTable"></tbody>
      </table>
    </div>
    <div class="meta" id="lastUpdate"></div>
  </div>
</div>

</div>

<script>
const TOKEN = new URLSearchParams(location.search).get("token");
let allItems = [];
let currentFilter = "all";
let currentSearch = "";
let chart = null;

const COLORS = { todo: "#f87171", prog: "#fbbf24", done: "#34d399" };
const LABELS = { todo: "ยังไม่ทำ", prog: "กำลังทำ", done: "เสร็จแล้ว" };

function qs(id) { return document.getElementById(id); }
function esc(t) { const d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

function showView(v) {
  ["homeView","dashboardView","homeworkView"].forEach(id => qs(id).classList.add("hide"));
  qs(v).classList.remove("hide");
  qs(v).style.animation = "none";
  requestAnimationFrame(() => qs(v).style.animation = "fadeIn .3s ease");
  document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));
  const map = { homeView: 0, dashboardView: 1, homeworkView: 2 };
  const btns = document.querySelectorAll(".nav-link");
  if (btns[map[v]]) btns[map[v]].classList.add("active");
}

function showHome() { showView("homeView"); loadHomeStats(); }
function showDashboard() { showView("dashboardView"); loadDashboard(); }
function showHomework() { showView("homeworkView"); loadList(); }
function setHomeFilter(f) { currentFilter = f; showHomework(); }

async function fetchJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function loadHomeStats() {
  if (!TOKEN) return;
  try {
    const s = await fetchJson(`/api/stats?token=${TOKEN}`);
    qs("homeStats").innerHTML = `
      <div class="stat-card"><div class="stat-icon">📌</div><div class="stat-value" style="color:${COLORS.todo}">${s.todo}</div><div class="stat-label">ยังไม่ทำ</div></div>
      <div class="stat-card"><div class="stat-icon">🔄</div><div class="stat-value" style="color:${COLORS.prog}">${s.prog}</div><div class="stat-label">กำลังทำ</div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" style="color:${COLORS.done}">${s.done}</div><div class="stat-label">เสร็จแล้ว</div></div>
      <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value" style="color:#60a5fa">${s.total}</div><div class="stat-label">รวมทั้งหมด</div></div>
    `;
  } catch {}
}

async function loadDashboard() {
  if (!TOKEN) return;
  try {
    const [stats, homework] = await Promise.all([
      fetchJson(`/api/stats?token=${TOKEN}`),
      fetchJson(`/api/homework?token=${TOKEN}`),
    ]);
    allItems = homework;

    qs("dashStats").innerHTML = `
      <div class="stat-card"><div class="stat-icon">📌</div><div class="stat-value" style="color:${COLORS.todo}">${stats.todo}</div><div class="stat-label">ยังไม่ทำ</div></div>
      <div class="stat-card"><div class="stat-icon">🔄</div><div class="stat-value" style="color:${COLORS.prog}">${stats.prog}</div><div class="stat-label">กำลังทำ</div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" style="color:${COLORS.done}">${stats.done}</div><div class="stat-label">เสร็จแล้ว</div></div>
      <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value" style="color:#60a5fa">${stats.total}</div><div class="stat-label">รวมทั้งหมด</div></div>
      <div class="stat-card"><div class="stat-icon">⚡</div><div class="stat-value" style="color:#f97316">${stats.urgent}</div><div class="stat-label">เร่งด่วน</div></div>
      <div class="stat-card"><div class="stat-icon">🚨</div><div class="stat-value" style="color:#ef4444">${stats.overdue||0}</div><div class="stat-label">เลยกำหนด</div></div>
    `;

    const pct = stats.pct;
    qs("dashPct").textContent = pct + "%";
    qs("dashProgress").style.width = pct + "%";
    qs("dashDoneLabel").textContent = stats.done + " / " + stats.total;
    qs("dashTotalLabel").textContent = stats.total + " รายการ";

    const subs = Object.entries(stats.bySubject).sort((a,b) => b[1]-a[1]);
    qs("dashSubjects").innerHTML = subs.length
      ? subs.map(([n,c]) => `<div class="badge-pill"><span>${esc(n)}</span><span class="badge-count">${c}</span></div>`).join("")
      : '<span style="color:#64748b;font-size:13px;">🎉 ไม่มี</span>';

    const today = new Date(); today.setHours(0,0,0,0);
    const eow = new Date(today); eow.setDate(today.getDate()+(7-today.getDay()));
    const enw = new Date(eow); enw.setDate(eow.getDate()+7);
    const grp = { overdue: 0, thisWeek: 0, nextWeek: 0, later: 0 };
    for (const item of allItems) {
      if (item.status === "Done" || !item.due) continue;
      const dt = new Date(item.due+"T00:00:00");
      if (dt < today) grp.overdue++;
      else if (dt <= eow) grp.thisWeek++;
      else if (dt <= enw) grp.nextWeek++;
      else grp.later++;
    }
    qs("dashTimeGroups").innerHTML = [
      ["🚨 เลยกำหนด", grp.overdue, "#ef4444"],
      ["📅 อาทิตย์นี้", grp.thisWeek, "#fbbf24"],
      ["📅 อาทิตย์หน้า", grp.nextWeek, "#60a5fa"],
      ["📅 ยังอีกนาน", grp.later, "#94a3b8"],
    ].filter(([_,c]) => c).map(([l,c,cl]) =>
      `<div class="time-badge" style="border-left:3px solid ${cl}"><span>${l}</span><span class="num" style="color:${cl}">${c}</span></div>`
    ).join("") || '<span style="color:#64748b;font-size:13px;">ไม่มีข้อมูล</span>';

    renderChart(stats);
  } catch (err) {
    qs("dashStats").innerHTML = `<div class="empty">❌ ${err.message}</div>`;
  }
}

function renderChart(s) {
  if (chart) { chart.destroy(); chart = null; }
  const ctx = qs("statusChart").getContext("2d");
  chart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["ยังไม่ทำ", "กำลังทำ", "เสร็จแล้ว"],
      datasets: [{
        data: [s.todo, s.prog, s.done],
        backgroundColor: ["#f87171", "#fbbf24", "#34d399"],
        borderWidth: 0,
        hoverOffset: 6,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      cutout: "70%",
      plugins: {
        legend: {
          position: "bottom",
          labels: { color: "#94a3b8", padding: 16, usePointStyle: true, font: { size: 12 } },
        },
      },
      animation: { animateRotate: true, duration: 800 },
    },
  });
}

async function loadList() {
  if (!TOKEN) return;
  try {
    if (!allItems.length) {
      allItems = await fetchJson(`/api/homework?token=${TOKEN}`);
    }
    renderFilters();
    filterTable();
    qs("lastUpdate").textContent = "อัปเดตล่าสุด: " + new Date().toLocaleString("th-TH");
  } catch (err) {
    qs("homeworkTable").innerHTML = `<tr><td colspan="5" class="empty">❌ ${err.message}</td></tr>`;
  }
}

function renderFilters() {
  const c = { all: allItems.length, overdue: 0 };
  for (const i of allItems) {
    const s = i.status === "Todo" ? "todo" : i.status === "In Progress" ? "prog" : "done";
    c[s] = (c[s]||0) + 1;
    if (i.status !== "Done" && i.due && new Date(i.due+"T00:00:00") < new Date()) c.overdue++;
  }
  const tabs = [
    ["all", `ทั้งหมด`],
    ["overdue", `🚨 เลยกำหนด`],
    ["todo", `📌 ยังไม่ทำ`],
    ["prog", `🔄 กำลังทำ`],
    ["done", `✅ เสร็จแล้ว`],
  ];
  qs("filterTabs").innerHTML = tabs.map(([k]) =>
    `<button class="filter-btn${currentFilter===k?' active':''}" onclick="setFilter('${k}')">${tabs.find(t=>t[0]===k)[1]}</button>`
  ).join("");
}

function setFilter(f) { currentFilter = f; renderFilters(); filterTable(); }

function filterTable() {
  currentSearch = qs("searchBox").value.toLowerCase().trim();
  let filtered = allItems;
  const today = new Date(); today.setHours(0,0,0,0);

  if (currentFilter === "overdue") filtered = filtered.filter(i => i.status !== "Done" && i.due && new Date(i.due+"T00:00:00") < today);
  else if (currentFilter === "todo") filtered = filtered.filter(i => i.status === "Todo");
  else if (currentFilter === "prog") filtered = filtered.filter(i => i.status === "In Progress");
  else if (currentFilter === "done") filtered = filtered.filter(i => i.status === "Done");

  if (currentSearch) {
    filtered = filtered.filter(i =>
      i.title.toLowerCase().includes(currentSearch) ||
      i.subject.toLowerCase().includes(currentSearch)
    );
  }
  renderTable(filtered);
}

function renderTable(items) {
  const today = new Date(); today.setHours(0,0,0,0);
  const tbody = qs("homeworkTable");
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">📭 ไม่มีรายการที่ตรงเงื่อนไข</td></tr>';
    return;
  }
  const groups = { overdue: [], thisWeek: [], nextWeek: [], later: [], noDate: [], done: [] };
  const eow = new Date(today); eow.setDate(today.getDate()+(7-today.getDay()));
  const enw = new Date(eow); enw.setDate(eow.getDate()+7);
  for (const item of items) {
    if (item.status === "Done") { groups.done.push(item); continue; }
    if (!item.due) { groups.noDate.push(item); continue; }
    const dt = new Date(item.due+"T00:00:00");
    if (dt < today) groups.overdue.push(item);
    else if (dt <= eow) groups.thisWeek.push(item);
    else if (dt <= enw) groups.nextWeek.push(item);
    else groups.later.push(item);
  }
  const config = [
    ["🚨 เลยกำหนด", groups.overdue],
    ["📅 อาทิตย์นี้", groups.thisWeek],
    ["📅 อาทิตย์หน้า", groups.nextWeek],
    ["📅 ยังอีกนาน", groups.later],
    ["📅 ไม่กำหนด", groups.noDate],
    ["✅ เสร็จแล้ว", groups.done],
  ];
  let html = "";
  for (const [hdr, g] of config) {
    if (!g.length) continue;
    g.sort((a, b) => a.due && b.due ? a.due.localeCompare(b.due) : a.due ? -1 : 1);
    html += `<tr class="grp"><td colspan="5">${hdr} (${g.length})</td></tr>`;
    html += g.map(item => {
      const sc = item.status === "Todo" ? "todo" : item.status === "In Progress" ? "prog" : "done";
      const sl = LABELS[sc] || "เสร็จแล้ว";
      let dc = "", dl = item.due || "-", remain = "-";
      if (item.due) {
        const dt = new Date(item.due+"T00:00:00");
        const diff = Math.ceil((dt-today)/86400000);
        if (diff < 0) { dc = "overdue"; dl = item.due; remain = `เลย ${-diff} วัน`; }
        else if (diff === 0) { dc = "overdue"; dl = item.due; remain = "วันนี้"; }
        else if (diff <= 3) { dc = "soon"; dl = item.due; remain = `อีก ${diff} วัน`; }
        else { dc = "safe"; dl = item.due; remain = `อีก ${diff} วัน`; }
      }
      return `<tr>
        <td><span class="dot ${sc}"></span>${sl}</td>
        <td>${esc(item.title)}</td>
        <td><span class="tag">${esc(item.subject)}</span></td>
        <td class="${dc}">${dl}</td>
        <td class="${dc}">${remain}</td>
      </tr>`;
    }).join("");
  }
  tbody.innerHTML = html;
}

showHome();
</script>
</body>
